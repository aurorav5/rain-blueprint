global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: rain_backend
    static_configs:
      - targets: ['backend:8000']
    metrics_path: /metrics

  - job_name: rain_worker
    static_configs:
      - targets: ['worker:9808']

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: minio
    static_configs:
      - targets: ['minio:9000']
    metrics_path: /minio/v2/metrics/cluster

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: rain_app
      POSTGRES_PASSWORD: rain_dev
      POSTGRES_DB: rain
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rain_app -d rain"]
      interval: 5s
      timeout: 3s
      retries: 10

  valkey:
    image: valkey/valkey:9.0-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      - ./backend:/app
    environment:
      RAIN_ENV: development
      RAIN_VERSION: "6.0.0"
      RAIN_LOG_LEVEL: debug
      RAIN_NORMALIZATION_VALIDATED: "false"
      FRONTEND_URL: "http://localhost:5173"
      DATABASE_URL: "postgresql+asyncpg://rain_app:rain_dev@postgres:5432/rain"
      REDIS_URL: "redis://valkey:6379/0"
      S3_BUCKET: "rain-audio"
      S3_ENDPOINT_URL: "http://localhost:9000"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      JWT_SECRET_KEY: "dev-secret-key-do-not-use-in-production"
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://localhost:8000/api/v1"
    command: npm run dev -- --host
    depends_on:
      - backend

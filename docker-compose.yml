# Container-internal URLs used by backend/worker. These override the host-oriented
# values in .env because containers resolve services by hostname, not localhost.
x-backend-env: &backend-env
  DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
  VALKEY_URL: "redis://valkey:6379/0"
  REDIS_URL: "redis://valkey:6379/0"  # legacy compat — points at valkey
  S3_ENDPOINT_URL: "http://minio:9000"
  JWT_PUBLIC_KEY_PATH: /etc/rain/jwt.pub
  JWT_PRIVATE_KEY_PATH: /etc/rain/jwt.key
  RAIN_CERT_SIGNING_KEY_PATH: /etc/rain/cert.key
  RAIN_WATERMARK_KEY_PATH: /etc/rain/jwt.key
  ONNX_MODEL_PATH: "/models/rain_base.onnx"
  FRONTEND_URL: "http://localhost:5173,http://localhost:5174,http://localhost:4173"
  # Admin seed (picked up by migration 0005 / scripts/seed_admin_user.py)
  RAIN_ADMIN_EMAIL: "${RAIN_ADMIN_EMAIL:-philippusbolke@gmail.com}"
  RAIN_ADMIN_PASSWORD: "${RAIN_ADMIN_PASSWORD:-}"
  RAIN_ADMIN_TIER: "${RAIN_ADMIN_TIER:-enterprise}"
  RAIN_ADMIN_IS_ADMIN: "${RAIN_ADMIN_IS_ADMIN:-true}"

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql:ro
    ports:
      - "5432:5432"
    networks:
      - rain-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rain_app} -d ${POSTGRES_DB:-rain}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  valkey:
    image: valkey/valkey:9.0-alpine
    command: >
      valkey-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - valkey_data:/data
    ports:
      - "6379:6379"
    networks:
      - rain-net
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - rain-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - rain-net
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/rain-audio &&
      mc anonymous set none local/rain-audio
      "

  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./keys:/etc/rain:ro
    env_file: .env
    environment: *backend-env
    networks:
      - rain-net
    command: alembic upgrade head
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
      - ./keys:/etc/rain:ro
      - ./models:/models:ro
    env_file: .env
    environment: *backend-env
    ports:
      - "8000:8000"
    networks:
      - rain-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
      - ./keys:/etc/rain:ro
      - ./models:/models:ro
    env_file: .env
    environment: *backend-env
    networks:
      - rain-net
    command: celery -A app.worker worker --loglevel=info -Q cpu_standard,gpu_priority_low,gpu_priority_medium,gpu_priority_high,distribution,certification

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: "http://localhost:8000/api/v1"
    ports:
      - "5173:5173"
    networks:
      - rain-net
    command: npm run dev -- --host 0.0.0.0

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - rain-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-rain_grafana}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - rain-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      - prometheus

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - rain-net
    depends_on:
      postgres:
        condition: service_healthy

  valkey-exporter:
    image: oliver006/redis_exporter:v1.58.0
    environment:
      REDIS_ADDR: "redis://valkey:6379"
    ports:
      - "9121:9121"
    networks:
      - rain-net
    depends_on:
      valkey:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - rain-net
    depends_on:
      - backend
      - frontend
    profiles:
      - prod

volumes:
  postgres_data:
  valkey_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  rain-net:
    driver: bridge

version: '3.9'

# RAIN Prototype — lightweight dev stack (no DB, no Redis, no S3)
# Usage: docker compose -f docker-compose.prototype.yml up --build

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    volumes:
      - ./backend:/app
    environment:
      RAIN_ENV: development
      RAIN_VERSION: "6.0.0"
      RAIN_LOG_LEVEL: debug
      RAIN_NORMALIZATION_VALIDATED: "false"
      FRONTEND_URL: "http://localhost:5173"
      DATABASE_URL: "sqlite:///dev.db"
      REDIS_URL: "redis://localhost:6379/0"
      S3_BUCKET: "rain-audio"
      S3_ENDPOINT_URL: "http://localhost:9000"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      JWT_SECRET_KEY: "dev-secret-key-do-not-use-in-production"
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://localhost:8000/api/v1"
    command: npm run dev -- --host
    depends_on:
      - backend
